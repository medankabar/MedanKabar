<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>Medan Kabar - Official Links Bio</title>
  <meta name="description" content="Menggali Fakta, Bukan Hanya Headline, Tapi Heartline. Portal berita terpercaya.">
  <meta name="theme-color" content="#041C44">
  
  <link rel="shortcut icon" href="MedanKabar.jpg" type="image/x-icon">

  <meta property="og:title" content="Medan Kabar - Official Links">
  <meta property="og:description" content="Menggali Fakta, Bukan Hanya Headline, Tapi Heartline.">
  <meta property="og:image" content="https://www.medankabar.com/MedanKabar.jpg"> 
  <meta property="og:url" content="https://www.medankabar.com">
  <meta property="og:type" content="website">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    /* --- CSS TAMBAHAN AGAR SEPERTI APLIKASI (Hapus Highlight Biru saat Klik) --- */
    * {
        -webkit-tap-highlight-color: transparent;
    }

    /* --- ANTI COPY PASTE CSS (LAYER 1) --- */
    body {
      -webkit-user-select: none; /* Safari */
      -moz-user-select: none;    /* Firefox */
      -ms-user-select: none;     /* IE10+/Edge */
      user-select: none;         /* Standard */
    }
    
    /* Mencegah gambar didrag/diseret */
    img {
      -webkit-user-drag: none;
      user-drag: none;
      pointer-events: none; 
    }
    
    /* Kembalikan pointer events untuk link agar tetap bisa diklik */
    a img {
      pointer-events: auto; 
    }

    /* PENGATURAN WARNA (BRANDING MEDAN KABAR) 
       Default (:root) sekarang adalah Biru Navy sesuai logo.
    */
    :root {
      --bg: #041C44;       /* Background Biru Navy Gelap */
      --text: #ffffff;     /* Teks Putih */
      --card: #062659;     /* Warna Kartu/Tombol sedikit lebih terang dari BG */
      --accent: #E60012;   /* Warna Merah (seperti .com di logo) */
      --shadow: rgba(0, 0, 0, 0.4);
      --border-btn: #ffffff; /* Garis pinggir tombol utama */
    }

    /* Kelas untuk Mode Terang (Light Mode) - Kebalikan dari default */
    .light-mode {
      --bg: #f4f7fc;
      --text: #041C44;     /* Teks jadi Biru Navy */
      --card: #ffffff;
      --accent: #E60012;
      --shadow: rgba(0, 0, 0, 0.1);
      --border-btn: #041C44;
    }

    /* Gaya dasar body */
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background-color 0.6s ease, color 0.6s ease;
      cursor: default; 
    }

    /* Gaya tombol toggle mode (Sekarang Light Mode) */
    .toggle-mode {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--accent);
      border-radius: 30px;
      padding: 6px 14px;
      font-size: 0.9rem;
      display: none;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 8px var(--shadow);
      cursor: pointer;
      z-index: 1000;
      transition: background 0.4s ease, color 0.4s ease;
      opacity: 0;
    }

    .toggle-mode.show {
      display: flex;
      animation: fadeIn 1s ease forwards;
    }

    .toggle-mode:hover {
      background: var(--accent);
      color: #fff;
    }

    .icon {
      font-size: 1rem;
    }

    /* Gaya Loader */
    .loader {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 60px;
      height: 60px;
      border: 6px solid rgba(255,255,255,0.2);
      border-top: 6px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      transform: translate(-50%, -50%);
      z-index: 10000;
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Gaya kontainer utama */
    .container {
      margin-top: 90px;
      padding: 1rem;
      width: 100%;
      max-width: 480px;
      box-sizing: border-box;
      text-align: center;
      display: none;
    }

    .fadeInUp {
      animation: fadeInUp 1s ease forwards;
    }

    .fadeIn {
      animation: fadeIn 1.2s ease forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Gaya logo */
    .logo {
      width: 80px; /* Diperbesar sedikit agar lebih jelas */
      height: 80px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 4px 12px var(--shadow);
      margin: 0 auto 1.2rem;
      border: 2px solid var(--text); /* Tambahan border agar logo 'pop' */
      opacity: 0;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1, p, .main-link, .social-icons, footer {
      opacity: 0;
    }

    h1 {
      font-size: 1.8rem;
      margin: 0.5rem 0;
      font-weight: 600;
      color: var(--text);
      transition: all 0.5s ease;
    }
    
    /* Span khusus untuk warna merah pada .com jika diinginkan */
    .accent-text {
        color: var(--accent);
    }

    p {
      font-size: 1rem;
      margin-bottom: 1.5rem;
      color: var(--text);
      opacity: 0.8;
    }

    .social-icons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
      flex-shrink: 0;
    }

    .social-icons a {
      background: #ffffff; /* Ikon selalu putih backgroundnya agar jelas */
      padding: 0.4rem;
      border-radius: 50%;
      box-shadow: 0 2px 6px var(--shadow);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
    }

    .social-icons a:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 16px var(--accent);
      background: var(--accent); /* Berubah merah saat hover */
    }
    
    .social-icons a:hover img {
        filter: brightness(0) invert(1); /* Icon jadi putih saat hover */
    }

    .social-icons img {
      width: 16px;
      height: 16px;
      transition: filter 0.3s;
    }

    .main-link {
      background: transparent;
      color: var(--text);
      text-decoration: none;
      padding: clamp(0.8rem, 2vw + 0.5rem, 0.9rem) clamp(1.5rem, 4vw + 1rem, 1.8rem);
      border: 2px solid var(--accent); /* Border Merah */
      border-radius: 14px;
      font-weight: bold;
      font-size: clamp(1.5rem, 5vw + 0.5rem, 2.0rem);
      box-shadow: 0 4px 12px var(--shadow);
      transition: all 0.4s ease;
      margin: 0 auto 2rem;
      display: inline-block;
    }

    .main-link:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(230, 0, 18, 0.6);
    }

    footer {
      font-size: 0.875rem;
      text-align: center;
      color: var(--text);
      margin-top: 1.5rem;
      line-height: 1.5;
      opacity: 0;
    }

    .footer-line {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        display: block;
        margin-bottom: 0.2rem;
        opacity: 0.7;
    }

    .footer-link {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
        transition: color 0.3s ease;
    }

    .footer-link:hover {
        color: var(--text);
        text-decoration: underline;
    }

    @media (max-width: 768px) {
      .container {
        padding: 1rem 0.5rem;
      }

      .main-link {
        font-size: 1.4rem;
        padding: 0.8rem 1.4rem;
      }

      footer {
        font-size: 0.75rem;
      }

      .social-icons {
        gap: 0.4rem;
      }
    }
  </style>
</head>
<body oncontextmenu="return false;">
  <div class="loader" id="loader"></div>
  
  <button class="toggle-mode" id="modeToggle" onclick="toggleMode()">
    <span class="icon">☀️</span> Light Mode
  </button>
  
  <div class="container" id="mainContent">
    <div class="logo" id="logo"><img src="MedanKabar.jpg" alt="MedanKabar" /></div>
    
    <h1 id="title">Medan Kabar<span class="accent-text"></span></h1>
    
    <p id="desc">Menggali Fakta, Bukan Hanya Headline, Tapi Heartline.</p>
    
    <nav class="social-icons" id="socials" aria-label="Sosial Media">
      <a href="https://www.instagram.com/medankabar?igsh=MTFlc2UyM2p0ZGF3dw==" target="_blank" aria-label="Kunjungi Instagram Medan Kabar"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384063.png" alt="Instagram"></a>
      <a href="mailto:medankabaroffice@gmail.com" aria-label="Kirim Email ke Medan Kabar"><img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" alt="Email"></a>
      <a href="https://www.facebook.com/medankabarcom" target="_blank" aria-label="Kunjungi Facebook Medan Kabar"><img src="https://cdn-icons-png.flaticon.com/512/145/145802.png" alt="Facebook"></a>
      <a href="https://www.youtube.com/@medankabar" target="_blank" aria-label="Kunjungi YouTube Medan Kabar"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YouTube"></a>
      <a href="https://www.threads.com/@medankabar" target="_blank" aria-label="Kunjungi Threads Medan Kabar"><img src="https://iili.io/3cZnPBS.png" alt="Threads"></a>
      <a href="https://www.tiktok.com/@medankabar.com?utm_campaign=linkinbio&utm_medium=referral&utm_source=later-linkinbio" target="_blank" aria-label="Kunjungi TikTok Medan Kabar"><img src="https://iili.io/3cZIVat.png" alt="TikTok"></a>
      <a href="https://api.whatsapp.com/send/?phone=%2B6285358249709&type=phone_number&app_absent=0" target="_blank" aria-label="Kirim Pesan WhatsApp ke Medan Kabar"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp"></a>
    </nav>

    <a class="main-link" id="mainLink" href="https://www.medankabar.com" target="_blank">MEDANKABAR.COM</a>
    <footer id="footer"></footer>

  </div>
  <script>
    const toggleBtn = document.getElementById('modeToggle');
    let isManualOverride = false;

    // Fungsi Logika Mode (Sekarang membalik logika karena defaultnya adalah Dark Blue)
    function applyMode(isLight) {
      document.documentElement.classList.toggle('light-mode', isLight);
      
      if (isLight) {
          toggleBtn.innerHTML = '<span class="icon">🌙</span> Dark Mode';
          // Ubah meta theme color untuk light mode
          document.querySelector('meta[name="theme-color"]').setAttribute('content', '#f4f7fc');
      } else {
          toggleBtn.innerHTML = '<span class="icon">☀️</span> Light Mode';
          // Kembalikan meta theme color ke Biru Medan Kabar
          document.querySelector('meta[name="theme-color"]').setAttribute('content', '#041C44');
      }
    }

    function toggleMode() {
      const currentlyLight = document.documentElement.classList.contains('light-mode');
      applyMode(!currentlyLight);
      isManualOverride = true;
    }

    function getAutomaticModeStatus() {
        // Cek preferensi sistem, tapi prioritaskan tampilan branding (Dark Blue)
        const prefersSystemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        // Jika sistem dark, biarkan default (false untuk light-mode). Jika sistem light, aktifkan light-mode.
        // TAPI karena requestnya branding, kita bisa set default false (tetap biru) kecuali user ubah.
        return false; 
    }

    window.addEventListener('DOMContentLoaded', () => {
      const loader = document.getElementById('loader');
      const content = document.getElementById('mainContent');
      const footer = document.getElementById('footer');
      const currentYear = new Date().getFullYear();
      
      footer.innerHTML = `
        <span class="footer-line">© Mediaga Group ${currentYear} - Semua hak cipta dilindungi.</span>
        <span class="footer-line">Made by: <a href="https://appwebiatech.github.io/AppWebiatech/" target="_blank" class="footer-link">AppWebiatech</a></span>
      `;

      setTimeout(() => {
        loader.style.display = 'none';
        content.style.display = 'block';
        toggleBtn.classList.add('show');

        // Pastikan defaultnya branding (Biru)
        if (!isManualOverride) {
            // applyMode(false); // Default is Dark/Brand Color
        }

        document.getElementById('logo').classList.add('fadeInUp');
        setTimeout(() => document.getElementById('title').classList.add('fadeInUp'), 200);
        setTimeout(() => document.getElementById('desc').classList.add('fadeInUp'), 400);
        setTimeout(() => document.getElementById('socials').classList.add('fadeInUp'), 600);
        setTimeout(() => document.getElementById('mainLink').classList.add('fadeInUp'), 800);
        setTimeout(() => document.getElementById('footer').classList.add('fadeIn'), 1000);
      }, 1500);

    });

    // --- FITUR KEAMANAN TAMBAHAN (PERLINDUNGAN PENUH - TIDAK DIKURANGI) ---
    // Mencegah Klik Kanan (Context Menu)
    document.addEventListener('contextmenu', event => event.preventDefault());
    // Mencegah Seleksi/Blok Teks
    document.addEventListener('selectstart', event => event.preventDefault());
    // Mencegah Drag Gambar
    document.addEventListener('dragstart', event => event.preventDefault());
    // Mencegah Shortcut Keyboard
    document.addEventListener('keydown', function(e) {
        if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); return false; }
        if (e.ctrlKey) {
            if (e.key === 'u' || e.key === 'U' || e.keyCode === 85) { e.preventDefault(); return false; }
            if (e.key === 'c' || e.key === 'C' || e.keyCode === 67) { e.preventDefault(); return false; }
            if (e.key === 's' || e.key === 'S' || e.keyCode === 83) { e.preventDefault(); return false; }
            if (e.key === 'p' || e.key === 'P' || e.keyCode === 80) { e.preventDefault(); return false; }
            if (e.key === 'a' || e.key === 'A' || e.keyCode === 65) { e.preventDefault(); return false; }
            if (e.shiftKey && (e.key === 'i' || e.key === 'I' || e.keyCode === 73 || e.key === 'j' || e.key === 'J' || e.keyCode === 74)) { e.preventDefault(); return false; }
            if (e.shiftKey && (e.key === 'c' || e.key === 'C' || e.keyCode === 67)) { e.preventDefault(); return false; }
        }
    });
  </script>
</body>
</html>
